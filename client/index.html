<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Facial Verification (University of Ilorin Case Study) || Verification Page</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="shortcut icon" href="./logo.jpeg" type="image/x-icon">
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- <script src="/client/assets/scripts/main.js"></script>
    <script src="/client/assets/scripts/face-api.min.js"></script>
    <link rel="stylesheet" href="/client/assets/styles/index.css"> -->
    <script src="/assets/scripts/main.js"></script>
    <script src="/assets/scripts/face-api.min.js"></script>
    <link rel="stylesheet" href="/assets/styles/index.css">
</head>

<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card p-8 w-full max-w-2xl slide-in">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-black mb-4">
                    Student Facial Verification
                </h1>
                <p class="text-lg text-black/80 mb-2">University of Ilorin Case Study</p>
                <p class="text-sm text-black/60">
                    Currently available for 400L and Non-DE 300L Computer Science students
                </p>
            </div>

            <div class="space-y-6">
                <div id="statusMessage" class="status-message" style="display: none;"></div>
                <div class="text-center">
                    <label for="matricNumber" class="block text-black font-medium mb-3">
                        Enter Matric Number:
                    </label>
                    <input class="input-field" type="text" id="matricNumber"
                        placeholder="Format: XX/XXXXXXXX (e.g., 20/52HA001)">
                </div>

                <div class="flex justify-center">
                    <div class="video-container pulse-animation" id="videoContainer" style="display: none;">
                        <div class="progress-circle" id="progressCircle"></div>
                        <video id="videoElement" autoplay playsinline muted></video>
                        <canvas id="faceCanvas"></canvas>
                        <div class="direction-indicator" id="directionIndicator" style="display: none;">
                            👀
                        </div>
                    </div>
                </div>

                <div class="liveness-steps" id="livenessSteps" style="display: none;">
                    <div class="step-indicator" data-direction="center">👤</div>
                    <div class="step-indicator" data-direction="left">👈</div>
                    <div class="step-indicator" data-direction="right">👉</div>
                    <div class="step-indicator" data-direction="up">👆</div>
                </div>

                <div class="flex justify-center gap-4">
                    <button id="startButton" class="btn-primary">
                        Start Verification
                    </button>
                    <button id="retryButton" class="btn-primary" style="display: none;">
                        Retry
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="spinner"></div>
        <div id="loadingText">Loading face detection models...</div>
    </div>
    <button id="scrollToTopBtn">
        ↑
    </button>
</body>

</html>
